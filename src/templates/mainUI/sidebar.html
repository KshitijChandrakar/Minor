<style>
    .sidebar-svg {
        fill: var(--primary);
    }
    .outline-container {
        font-size: 14px;
    }

    .outline-item {
        margin: 4px 0;
    }

    .outline-summary {
        cursor: pointer;
        padding: 8px 12px;
        border-radius: 6px;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        gap: 8px;
        width: fit-content;
        list-style: none;
    }

    .outline-summary::-webkit-details-marker {
        display: none;
    }

    .outline-arrow {
        display: inline-block;
        font-size: 12px;
        transition: transform 0.2s ease;
        color: #6b7280;
    }

    details[open] .outline-arrow {
        transform: rotate(90deg);
    }

    .outline-summary:hover {
        background-color: #e0e7ff;
        color: #1e40af;
    }

    .outline-summary:hover .outline-arrow {
        color: #1e40af;
    }

    .outline-text {
        flex: 1;
    }

    .outline-content {
        margin-left: 24px;
        padding-left: 8px;
        border-left: 2px solid #e5e7eb;
    }

    details[open] > .outline-summary {
        margin-bottom: 8px;
    }

    /* Additional custom styles to complement Tachyons */
    .sidebar-toggle-btn {
        background: var(--primary-bg);
        border: 1px solid var(--primary);
        color: var(--primary);
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .sidebar-toggle-btn:hover {
        background: var(--regular-button-hover-bg);
    }

    .sidebar-toggle-btn.active {
        background: var(--selection-bg);
        color: var(--selected-button-text);
        border-color: var(--selection-bg);
    }

    .sidebar {
        background: var(--button-group-bg);
        border: 1px solid var(--button-group-border);
        border-left: none;
        /* width: 300px; */
        height: 100%;
    }

    .sidebar-header {
        border-bottom: 1px solid var(--button-group-border);
        padding: 0.75rem 1rem;
    }

    .sidebar-title {
        font-weight: 600;
        color: var(--regular-button-text);
    }

    .sidebar-new-btn {
        background: transparent;
        border: none;
        color: var(--regular-button-text);
        cursor: pointer;
        font-size: 1.25rem;
        padding: 0 0.5rem;
        transition: all 0.2s ease;
    }

    .sidebar-new-btn:hover {
        background: var(--regular-button-hover-bg);
        border-radius: 4px;
    }

    .sidebar-list {
        list-style: none;
        margin: 0;
        padding: 0;
    }

    .sidebar-list li {
        padding: 0.5rem 1rem;
        cursor: pointer;
        transition: all 0.2s ease;
        color: var(--regular-button-text);
    }

    .sidebar-list li:hover {
        background: var(--regular-button-hover-bg);
    }

    .sidebar-list li.active {
        background: var(--selection-bg);
        color: var(--selected-button-text);
    }

    #sidebar-content {
        padding: 1rem;
        color: var(--regular-button-text);
    }

    .error-item {
        padding: 0.5rem;
        margin-bottom: 0.5rem;
        background: rgba(255, 0, 0, 0.1);
        border-left: 3px solid red;
        font-size: 0.875rem;
    }

    /* Sidebar container animation */
    .sidebar-container {
        position: relative;
        overflow: hidden;
    }

    .sidebar {
        display: none;
    }

    .sidebar.active {
        display: flex;
    }
</style>

<div
